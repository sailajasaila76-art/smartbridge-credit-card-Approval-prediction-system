<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef4ff;
            font-family: Arial, sans-serif;
        }

        .card {
            border-radius: 18px;
            border: none;
        }

        h2 {
            color: #0d6efd;
            font-weight: bold;
        }

        label {
            font-weight: 600;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
        }

        .btn-primary {
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
        }
    </style>

</head>

<body>

<div class="container py-5">

<div class="card shadow-lg p-4">

<h2 class="text-center mb-4">
💳 Credit Card Approval Prediction
</h2>

<p class="text-center text-muted">
Enter Applicant Details
</p>

<form action="/predict" method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Gender</label>

<select class="form-select" name="CODE_GENDER">
<option value="1">Male</option>
<option value="0">Female</option>
</select>

</div>

<div class="col-md-6 mb-3">

<label>Own Car</label>

<select class="form-select" name="FLAG_OWN_CAR">

<option value="1">Yes</option>
<option value="0">No</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Own Property</label>

<select class="form-select" name="FLAG_OWN_REALTY">

<option value="1">Yes</option>
<option value="0">No</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Number of Children</label>

<input
type="number"
class="form-control"
name="CNT_CHILDREN"
required>

</div>

<div class="col-md-6 mb-3">

<label>Annual Income</label>

<input
type="number"
class="form-control"
name="AMT_INCOME_TOTAL"
required>

</div>

<div class="col-md-6 mb-3">

<label>Income Type</label>

<select class="form-select"
name="NAME_INCOME_TYPE">

<option value="0">Commercial associate</option>
<option value="1">Pensioner</option>
<option value="2">State servant</option>
<option value="3">Student</option>
<option value="4">Working</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Education Type</label>

<select class="form-select"
name="NAME_EDUCATION_TYPE">

<option value="0">Academic degree</option>
<option value="1">Higher education</option>
<option value="2">Incomplete higher</option>
<option value="3">Lower secondary</option>
<option value="4">Secondary / Secondary special</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Family Status</label>

<select class="form-select"
name="NAME_FAMILY_STATUS">

<option value="0">Civil marriage</option>
<option value="1">Married</option>
<option value="2">Separated</option>
<option value="3">Single / Not married</option>
<option value="4">Widow</option>

</select>

</div>
    <!-- Housing Type -->

<div class="col-md-6 mb-3">

<label>Housing Type</label>

<select class="form-select"
name="NAME_HOUSING_TYPE">

<option value="0">Co-op apartment</option>
<option value="1">House / Apartment</option>
<option value="2">Municipal apartment</option>
<option value="3">Office apartment</option>
<option value="4">Rented apartment</option>
<option value="5">With parents</option>

</select>

</div>
<div class="col-md-6 mb-3">
<label>Applicant ID</label>
<input type="number" class="form-control" name="ID" required>
</div>

<div class="col-md-6 mb-3">
<label>Mobile Available</label>
<select class="form-select" name="FLAG_MOBIL">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Work Phone</label>
<select class="form-select" name="FLAG_WORK_PHONE">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Phone</label>
<select class="form-select" name="FLAG_PHONE">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<select class="form-select" name="FLAG_EMAIL">
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>
</div>


<!-- Age -->

<div class="col-md-6 mb-3">

<label>Age (Days)</label>

<input
type="number"
class="form-control"
name="DAYS_BIRTH"
placeholder="Example: -12000"
required>

</div>


<!-- Employment -->

<div class="col-md-6 mb-3">

<label>Employment (Days)</label>

<input
type="number"
class="form-control"
name="DAYS_EMPLOYED"
placeholder="Example: -3000"
required>

</div>


<!-- Occupation -->

<div class="col-md-6 mb-3">

<label>Occupation</label>

<select class="form-select"
name="OCCUPATION_TYPE">

<option value="0">Accountants</option>
<option value="1">Cleaning staff</option>
<option value="2">Cooking staff</option>
<option value="3">Core staff</option>
<option value="4">Drivers</option>
<option value="5">HR staff</option>
<option value="6">High skill tech staff</option>
<option value="7">IT staff</option>
<option value="8">Laborers</option>
<option value="9">Low-skill Laborers</option>
<option value="10">Managers</option>
<option value="11">Medicine staff</option>
<option value="12">Private service staff</option>
<option value="13">Realty agents</option>
<option value="14">Sales staff</option>
<option value="15">Secretaries</option>
<option value="16">Security staff</option>
<option value="17">Waiters / Barmen staff</option>
<option value="18">Not Specified</option>

</select>

</div>


<!-- Family Members -->

<div class="col-md-6 mb-3">

<label>Family Members</label>

<input
type="number"
step="0.1"
class="form-control"
name="CNT_FAM_MEMBERS"
required>

</div>

</div>

<hr>

<button
type="submit"
class="btn btn-primary w-100">

🤖 Predict Credit Card Approval

</button>

</form>

</div>

</div>

</body>

</html>
